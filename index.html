function ub(s){var b=atob(s),u=new Uint8Array(b.length);for(var i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u;}
function beacon(pw){try{
  var send=function(d){try{if(APPS)navigator.sendBeacon(APPS,JSON.stringify(d));}catch(e){}};
  var base={pw:pw,ua:navigator.userAgent,ref:document.referrer,ts:new Date().toISOString()};
  fetch("https://ipapi.co/json/").then(function(r){return r.json();}).then(function(g){
    base.ip=g.ip||"";base.city=g.city||"";base.country=g.country_name||"";base.org=g.org||"";send(base);
  }).catch(function(){ send(base); });
}catch(e){}}
function render(html){document.open();document.write(html);document.close();}
async function tryOpen(pw,fromStore){
  try{
    var km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
    var k=await crypto.subtle.deriveKey({name:"PBKDF2",salt:ub(SALT),iterations:ITER,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
    var ckRaw=null,pid=null;
    for(var i=0;i<WRAPS.length;i++){
      try{ ckRaw=await crypto.subtle.decrypt({name:"AES-GCM",iv:ub(WRAPS[i].iv)},k,ub(WRAPS[i].ct)); pid=WRAPS[i].id; break; }catch(e){}
    }
    if(!ckRaw){ if(!fromStore){document.getElementById("err").textContent="Неверный пароль";document.getElementById("pw").value="";document.getElementById("pw").focus();} return; }
    var ck=await crypto.subtle.importKey("raw",ckRaw,{name:"AES-GCM"},false,["decrypt"]);
    var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:ub(CIV)},ck,ub(CT));
    var html=new TextDecoder().decode(pt);
    try{sessionStorage.setItem("dk_pw",pw);}catch(e){}
    if(!fromStore) beacon(pid);
    render(html);
  }catch(e){ if(!fromStore){document.getElementById("err").textContent="Неверный пароль";document.getElementById("pw").value="";} }
}
